name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Pack134HikeClub
    steps:
      - uses: actions/checkout@v4

      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --strict

      - name: Select simulator
        run: |
          NAME=$(xcrun simctl list devices available -j | jq -r '[.devices[][] | select(.name | test("^iPhone"))][0].name')
          echo "SIMULATOR_NAME=$NAME" >> "$GITHUB_ENV"

      - name: Build and test
        run: |
          xcodebuild test \
            -scheme Pack134HikeClub \
            -destination "platform=iOS Simulator,name=$SIMULATOR_NAME" \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: Pack134HikeClub/TestResults.xcresult
