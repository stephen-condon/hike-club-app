name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Pack134HikeClub
    steps:
      - uses: actions/checkout@v4

      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --strict

      - name: Select simulator
        run: |
          # Pick the destination from xcodebuild's own view — simctl can list devices
          # whose runtime the selected Xcode can't actually use as a test destination.
          first_iphone_destination() {
            xcodebuild -scheme Pack134HikeClub -showdestinations 2>/dev/null \
              | sed -n 's/.*platform:iOS Simulator.*name:\(iPhone[^,}]*\).*/\1/p' | head -1 | xargs
          }
          # CoreSimulatorService is often still cold-starting on a fresh runner, which makes
          # the first -showdestinations call fail with "Unable to connect to simulator".
          # Touch simctl once to warm it, then retry the real query a couple of times.
          xcrun simctl list devices >/dev/null 2>&1 || true
          NAME=""
          for _ in 1 2 3; do
            NAME=$(first_iphone_destination)
            [ -n "$NAME" ] && break
            sleep 5
          done
          if [ -z "$NAME" ]; then
            # Runner image shipped without a usable iOS runtime for this Xcode — install it
            sudo xcodebuild -runFirstLaunch
            sudo xcodebuild -downloadPlatform iOS
            NAME=$(first_iphone_destination)
          fi
          [ -n "$NAME" ] || { echo "::error::No iPhone simulator destination available"; exit 1; }
          echo "SIMULATOR_NAME=$NAME" >> "$GITHUB_ENV"

      - name: Build and test
        run: |
          xcodebuild test \
            -scheme Pack134HikeClub \
            -destination "platform=iOS Simulator,name=$SIMULATOR_NAME" \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: Pack134HikeClub/TestResults.xcresult
